name: Mark stale issues and pull requests

on:
  schedule:
    - cron: "16 5 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "This issue has had no activity for 60 days and has been marked stale."
          stale-pr-message: "This pull request has had no activity for 30 days and has been marked stale."
          close-issue-message: "Closing due to inactivity."
          close-pr-message: "Closing due to inactivity."
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 7
          stale-issue-label: "no-issue-activity"
          stale-pr-label: "no-pr-activity"
